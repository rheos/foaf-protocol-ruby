services:
  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: foaf_dev_password
      MYSQL_DATABASE: foaf_protocol_development
    ports:
      - "3307:3306"
    volumes:
      - foaf_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  foaf:
    build: .
    ports:
      - "3002:3002"
    volumes:
      - .:/app
      - foaf_bundle:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql2://root:foaf_dev_password@db:3306/foaf_protocol_development
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: foaf_dev_secret_key_base_not_for_production

volumes:
  foaf_db_data:
  foaf_bundle:
